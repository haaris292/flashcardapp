name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Install backend deps
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      # 4️⃣ Install frontend deps
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # 5️⃣ Run lint (optional for now)
      - name: Run lint
        run: echo "Skipping lint for now"

      # 6️⃣ Run tests (optional for now)
      - name: Run tests
        run: echo "Skipping tests for now"

      # 7️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 8️⃣ Build backend image
      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/arabic-flashcards-backend:latest ./backend

      # 9️⃣ Build frontend image
      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/arabic-flashcards-frontend:latest ./frontend

      # 🔟 Push backend image
      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/arabic-flashcards-backend:latest

      # 1️⃣1️⃣ Push frontend image
      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/arabic-flashcards-frontend:latest